name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install package (editable)
        run: pip install -e .

      - name: Syntax check
        run: |
          python -m py_compile main.py
          python -m py_compile mentor/app.py mentor/cli.py mentor/__main__.py

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Validate config (module + CLI entrypoint)
        run: |
          python -m mentor check --skip-token
          mentor check --skip-token --print-config
          python -m mentor check --skip-token --init-db --verify-db --db-path /tmp/mentor-ci.db

      - name: Tests
        run: pytest -q
